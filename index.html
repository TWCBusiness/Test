<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wacoal - Receive_Bill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; }
        .wacoal-pink { color: #E3004F; }
        .bg-wacoal-pink { background-color: #E3004F; }
        .btn-hover:hover { background-color: #c20044; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loader { border-top-color: #E3004F; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hide-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="flex-grow flex flex-col items-center p-2 sm:p-4">
        <div id="loginPage" class="w-full max-w-md glass-morphism rounded-2xl shadow-2xl p-6 sm:p-8 mt-10">
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <div class="w-32 h-12 bg-gray-100 flex items-center justify-center rounded font-bold text-gray-400">WACOAL</div>
                </div>
                <h2 class="text-xl sm:text-2xl font-semibold text-gray-800">ระบบจัดการข้อมูลการรับบิล</h2>
            </div>
            <form id="loginForm" class="space-y-5">
                <input type="text" id="username" required class="w-full px-4 py-3 border rounded-lg outline-none" placeholder="Username">
                <input type="password" id="password" required class="w-full px-4 py-3 border rounded-lg outline-none" placeholder="Password">
                <button type="submit" class="w-full bg-wacoal-pink text-white py-3 rounded-lg btn-hover shadow-lg">เข้าสู่ระบบ</button>
            </form>
            <div id="loginError" class="mt-4 text-center text-red-500 hidden">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
        </div>

        <div id="dashboardPage" class="hidden w-full max-w-6xl flex flex-col space-y-4">
            <div class="sticky top-0 z-50 bg-white/90 backdrop-blur-md rounded-xl shadow-md p-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-wacoal-pink rounded-full flex items-center justify-center text-white font-bold">W</div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-800" id="userDisplayName">Welcome</h1>
                        <p class="text-gray-500 text-xs">ข้อมูลการรับบิล (Receive Bill)</p>
                    </div>
                </div>
                <div class="flex space-x-4">
                    <button onclick="fetchData()" class="text-wacoal-pink text-sm font-medium">🔄 รีเฟรช</button>
                    <button onclick="logout()" class="text-gray-500 text-sm font-medium">ออกจากระบบ</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-lg border overflow-hidden">
                <div class="overflow-x-auto hide-scroll max-h-[75vh]">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="sticky top-0 z-40 bg-gray-100">
                            <tr class="border-b">
                                <th class="px-6 py-4 text-sm font-semibold text-gray-600">Store Name</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-600">Store ID</th>
                                <th class="px-6 py-4 text-sm font-bold text-gray-800 sticky left-0 bg-gray-100 border-r">Bill No.</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-600">Bill Date</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-600 text-center">QTY</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-600 text-right">Total</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-600">Received Date</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-600">Status</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-600 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="billTableBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-800 text-white rounded-full shadow-2xl transition-all opacity-0 pointer-events-none z-[60]"></div>
    <div id="globalLoader" class="fixed inset-0 bg-white/60 hidden flex items-center justify-center z-[100]">
        <div class="loader rounded-full border-4 h-12 w-12"></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_S5fCo98f9he40ApSUnZks2XC-NB3OSmNBj-43K8MdNLMKtaV6oNLqFHqay_Yb0I/exec';
        let currentUser = null;
        let allBills = [];

        // --- Auth Logic ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userInp = document.getElementById('username').value.trim();
            const passInp = document.getElementById('password').value.trim();
            
            toggleLoader(true);
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(userInp)}&password=${encodeURIComponent(passInp)}`);
                const result = await res.json();
                if (result.success) { currentUser = result.user; showDashboard(); }
                else { showLoginError(); }
            } catch (e) { showToast("การเชื่อมต่อผิดพลาด"); }
            finally { toggleLoader(false); }
        });

        async function fetchData() {
            const tbody = document.getElementById('billTableBody');
            tbody.innerHTML = '<tr><td colspan="9" class="px-6 py-10 text-center text-sm text-gray-400">กำลังโหลด...</td></tr>';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getBills&store=${encodeURIComponent(currentUser.store)}`);
                const result = await res.json();
                allBills = result.data || [];
                renderBills(allBills);
            } catch (e) { showToast("โหลดข้อมูลล้มเหลว"); }
        }

        function renderBills(bills) {
            const tbody = document.getElementById('billTableBody');
            tbody.innerHTML = '';
            bills.forEach((bill, index) => {
                const inputVal = formatDateForInput(bill.receivedDate);
                const displayVal = formatDateDisplay(bill.receivedDate);
                const isReceived = !!bill.receivedDate;
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors group";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm text-gray-800">${bill.storeName}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${bill.store}</td>
                    <td class="px-6 py-4 text-sm font-medium text-wacoal-pink sticky left-0 bg-white group-hover:bg-gray-50 border-r">${bill.billNo}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${bill.billDate}</td>
                    <td class="px-6 py-4 text-sm text-center">${bill.qty}</td>
                    <td class="px-6 py-4 text-sm text-right font-semibold">฿${Number(bill.total).toLocaleString()}</td>
                    <td class="px-6 py-4">
                        <div class="flex flex-col">
                            <input type="date" value="${inputVal}" id="date-${index}" class="border rounded px-2 py-1 text-sm outline-none focus:border-wacoal-pink">
                            <span class="text-[10px] text-gray-400 mt-1">${isReceived ? 'รับบิลวันที่ : ' + displayVal : 'ยังไม่ได้ระบุ'}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-semibold rounded-full ${isReceived ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                            ${isReceived ? 'Received' : 'Pending'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="updateData(${index})" class="bg-wacoal-pink text-white px-4 py-1.5 rounded text-xs font-bold uppercase btn-hover">Update</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updateData(index) {
            const bill = allBills[index];
            const dateInput = document.getElementById(`date-${index}`);
            const selectedDateStr = dateInput.value; // YYYY-MM-DD

            if (!selectedDateStr) return showToast("⚠️ กรุณาระบุวันที่");

            // --- Validation Logic ---
            const [y, m, d] = selectedDateStr.split('-').map(Number);
            const receivedDate = new Date(y, m - 1, d);
            
            const billDate = parseThaiDate(bill.billDate); // ตัดเฉพาะ 10 ตัวแรก
            const today = new Date(); today.setHours(0,0,0,0);

            if (billDate && receivedDate < billDate) {
                showToast(`❌ วันที่รับห้ามก่อนวันที่บิล (${bill.billDate.substring(0,10)})`);
                return;
            }
            if (receivedDate > today) {
                showToast("❌ วันที่รับห้ามเกินวันที่ปัจจุบัน");
                return;
            }

            toggleLoader(true);
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'updateDate', billNo: bill.billNo, receivedDate: selectedDateStr })
                });
                showToast("✅ บันทึกสำเร็จ");
                setTimeout(fetchData, 1200);
            } catch (e) { showToast("❌ บันทึกไม่สำเร็จ"); }
            finally { toggleLoader(false); }
        }

        // --- Helper Utils ---
        function parseThaiDate(dateStr) {
            if (!dateStr) return null;
            const parts = dateStr.substring(0, 10).split('/');
            if (parts.length !== 3) return null;
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function formatDateDisplay(dateVal) {
            if (!dateVal) return "-";
            const d = new Date(dateVal);
            if (isNaN(d.getTime())) return dateVal;
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}/${d.getFullYear()}`;
        }

        function formatDateForInput(dateVal) {
            if (!dateVal) return "";
            const d = new Date(dateVal);
            if (isNaN(d.getTime())) return "";
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${d.getFullYear()}-${month}-${day}`;
        }

        function toggleLoader(show) { document.getElementById('globalLoader').classList.toggle('hidden', !show); }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('opacity-0'); t.classList.add('opacity-100');
            setTimeout(() => { t.classList.add('opacity-0'); t.classList.remove('opacity-100'); }, 3000);
        }
        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('userDisplayName').innerText = `สวัสดี, ${currentUser.name}`;
            fetchData();
        }
        function logout() { location.reload(); }
        function showLoginError() {
            document.getElementById('loginError').classList.remove('hidden');
            setTimeout(() => document.getElementById('loginError').classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
