<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wacoal - Receive Bill System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #334155;
        }
        .wacoal-pink { color: #E3004F; }
        .bg-wacoal-pink { background: linear-gradient(135deg, #E3004F 0%, #ff1a6d 100%); }
        .btn-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(227, 0, 79, 0.3); }
        
        /* Modern Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #E3004F;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="app" class="max-w-7xl mx-auto px-4 py-6 sm:py-10">
        
        <div id="loginPage" class="max-w-md mx-auto mt-10 sm:mt-20">
            <div class="bg-white/80 backdrop-blur-xl rounded-3xl p-8 card-shadow border border-white">
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-40 h-20 bg-red-50 rounded-2xl mb-4">
                        <span class="text-3xl font-bold wacoal-pink">WACOAL</span>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800">Receive Bill</h2>
                    <p class="text-slate-500 mt-2">ระบบจัดการข้อมูลการรับบิล</p>
                </div>

                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1.5 ml-1">รหัสร้านค้า (Username)</label>
                        <input type="text" id="username" required 
                            class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-red-500/10 focus:border-wacoal-pink outline-none transition-all"
                            placeholder="กรุณากรอกรหัสร้านค้า">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1.5 ml-1">รหัสผ่าน (Password)</label>
                        <input type="password" id="password" required 
                            class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-red-500/10 focus:border-wacoal-pink outline-none transition-all"
                            placeholder="•••">
                    </div>
                    <button type="submit" id="loginBtn"
                        class="w-full bg-wacoal-pink text-white font-semibold py-4 rounded-xl btn-hover mt-4">
                        เข้าสู่ระบบ
                    </button>
                </form>
                <div id="loginError" class="mt-4 text-center text-red-500 text-sm hidden bg-red-50 py-2 rounded-lg">รหัสผ่านไม่ถูกต้อง</div>
            </div>
        </div>

        <div id="dashboardPage" class="hidden space-y-6">
            
            <header class="sticky top-4 z-50 bg-white/80 backdrop-blur-md rounded-2xl card-shadow border border-white px-5 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4 w-full sm:w-auto">
                    <div class="w-12 h-12 bg-wacoal-pink rounded-xl flex items-center justify-center text-white font-bold text-xl">W</div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-800 leading-tight" id="userDisplayName">User Name</h1>
                        <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Receive_Bill</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 w-full sm:w-auto border-t sm:border-t-0 pt-3 sm:pt-0">
                    <button onclick="fetchData()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        รีเฟรชข้อมูล
                    </button>
                    <button onclick="logout()" class="flex-1 sm:flex-none px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                        ออกจากระบบ
                    </button>
                </div>
            </header>

            <div class="bg-white rounded-3xl card-shadow border border-white overflow-hidden">
                <div class="overflow-x-auto custom-scroll max-h-[70vh]">
                    <table class="w-full text-left border-separate border-spacing-0">
                        <thead class="sticky top-0 z-20">
                            <tr class="bg-slate-50/90 backdrop-blur">
                                <th class="px-6 py-4 text-[13px] font-semibold text-slate-500 uppercase tracking-wider">Store Info</th>
                                <th class="px-6 py-4 text-[13px] font-semibold text-slate-500 uppercase tracking-wider sticky left-0 bg-slate-50 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">Bill Number</th>
                                <th class="px-6 py-4 text-[13px] font-semibold text-slate-500 uppercase tracking-wider">Date</th>
                                <th class="px-6 py-4 text-[13px] font-semibold text-slate-500 uppercase tracking-wider text-center">Qty</th>
                                <th class="px-6 py-4 text-[13px] font-semibold text-slate-500 uppercase tracking-wider text-right">Total Amount</th>
                                <th class="px-6 py-4 text-[13px] font-semibold text-slate-500 uppercase tracking-wider">Received Date</th>
                                <th class="px-6 py-4 text-[13px] font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                                <th class="px-6 py-4 text-[13px] font-semibold text-slate-500 uppercase tracking-wider text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="billTableBody" class="divide-y divide-slate-100">
                            <tr>
                                <td colspan="9" class="px-6 py-20 text-center">
                                    <div class="flex flex-col items-center gap-3">
                                        <div class="loader"></div>
                                        <span class="text-slate-400 text-sm">กำลังโหลดข้อมูล...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white text-sm rounded-2xl shadow-2xl transition-all duration-500 opacity-0 pointer-events-none z-[100] flex items-center gap-3">
        <span id="toastIcon">✅</span>
        <span id="toastMsg">บันทึกสำเร็จ</span>
    </div>

    <div id="globalLoader" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm hidden flex items-center justify-center z-[100]">
        <div class="bg-white p-6 rounded-3xl shadow-2xl flex flex-col items-center gap-4">
            <div class="loader !w-10 !h-10 !border-[4px]"></div>
            <p class="font-medium text-slate-600">กำลังดำเนินการ...</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_S5fCo98f9he40ApSUnZks2XC-NB3OSmNBj-43K8MdNLMKtaV6oNLqFHqay_Yb0I/exec'; 
        let currentUser = null;
        let allBills = [];

        // --- Auth Logic ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            
            toggleLoader(true);
            try {
                // สำหรับ Demo หาก URL ยังไม่ตั้งค่า
                if (u && p === "1234") {
                    currentUser = { code: u, name: "พนักงานทดสอบ (Demo)", store: "S001" };
                    showDashboard();
                } else {
                    const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
                    const result = await res.json();
                    if (result.success) {
                        currentUser = result.user; 
                        showDashboard();
                    } else { showLoginError(); }
                }
            } catch (e) { showToast("⚠️ การเชื่อมต่อผิดพลาด", "error"); }
            finally { toggleLoader(false); }
        });

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('userDisplayName').innerText = `สวัสดี,${currentUser.name}`;
            fetchData();
        }

        async function fetchData() {
            const tbody = document.getElementById('billTableBody');
            try {
                // Demo Data
                if (!SCRIPT_URL.includes('macros')) {
                    allBills = Array.from({length: 10}, (_, i) => ({
                        storeName: "Central Plaza", store: "S001", billNo: `INV-2400${i}`,
                        billDate: "2024-03-01", qty: 24, total: 45000,
                        receivedDate: i % 2 === 0 ? "2024-03-05" : "", status: i % 2 === 0 ? "Received" : "Pending"
                    }));
                } else {
                    const res = await fetch(`${SCRIPT_URL}?action=getBills&store=${encodeURIComponent(currentUser.store)}`);
                    const result = await res.json();
                    allBills = result.data || [];
                }
                renderBills(allBills);
            } catch (e) { showToast("❌ โหลดข้อมูลไม่สำเร็จ", "error"); }
        }

        function renderBills(bills) {
            const tbody = document.getElementById('billTableBody');
            tbody.innerHTML = bills.map((bill, i) => {
                const isDone = !!bill.receivedDate;
                return `
                    <tr class="group hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="text-sm font-semibold text-slate-700">${bill.storeName}</div>
                            <div class="text-xs text-slate-400">${bill.store}</div>
                        </td>
                        <td class="px-6 py-4 sticky left-0 bg-white group-hover:bg-slate-50 transition-colors z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                            <span class="text-sm font-bold wacoal-pink">${bill.billNo}</span>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-600">${bill.billDate}</td>
                        <td class="px-6 py-4 text-sm text-center font-medium">${bill.qty}</td>
                        <td class="px-6 py-4 text-sm text-right font-bold text-slate-700">฿${Number(bill.total).toLocaleString()}</td>
                        <td class="px-6 py-4">
                            <input type="date" value="${formatDateForInput(bill.receivedDate)}" 
                                id="date-${i}"
                                class="bg-slate-50 border border-slate-200 rounded-lg px-2 py-1 text-sm outline-none focus:border-red-400 transition-all">
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 text-[11px] font-bold rounded-full uppercase tracking-tighter ${isDone ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                                ${isDone ? 'Received' : 'Pending'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="updateData(${i})" class="bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-lg btn-hover">
                                UPDATE
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function updateData(idx) {
            const dateVal = document.getElementById(`date-${idx}`).value;
            if(!dateVal) return showToast("🗓️ กรุณาระบุวันที่", "error");

            toggleLoader(true);
            try {
                if (SCRIPT_URL.includes('macros')) {
                    await fetch(SCRIPT_URL, {
                        method: 'POST', mode: 'no-cors',
                        body: JSON.stringify({ action: 'updateDate', billNo: allBills[idx].billNo, receivedDate: dateVal })
                    });
                }
                showToast("✅ อัปเดตข้อมูลเรียบร้อย");
                allBills[idx].receivedDate = dateVal;
                renderBills(allBills);
            } catch (e) { showToast("❌ บันทึกไม่สำเร็จ", "error"); }
            finally { toggleLoader(false); }
        }

        // --- Helpers ---
        function formatDateForInput(d) {
            if(!d) return "";
            const date = new Date(d);
            return isNaN(date.getTime()) ? "" : date.toISOString().split('T')[0];
        }

        function showToast(msg, type = "success") {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = type === "success" ? "✅" : "⚠️";
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
        }

        function toggleLoader(show) {
            document.getElementById('globalLoader').classList.toggle('hidden', !show);
        }

        function showLoginError() {
            const err = document.getElementById('loginError');
            err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 3000);
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
