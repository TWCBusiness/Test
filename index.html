<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wacoal - Receive Bill System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wacoal-pink: #E3004F;
            --wacoal-pink-hover: #C20044;
            --wacoal-soft-pink: #FFF0F5;
        }
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(135deg, #FFF5F7 0%, #FDE8EF 100%);
            color: #333;
        }
        .text-wacoal-pink { color: var(--wacoal-pink); }
        .bg-wacoal-pink { background-color: var(--wacoal-pink); }
        .bg-soft-pink { background-color: var(--wacoal-soft-pink); }
        
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { 
            background-color: var(--wacoal-pink-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(227, 0, 79, 0.3);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 40px rgba(227, 0, 79, 0.08);
        }

        .input-field {
            transition: all 0.3s ease;
            border: 1px solid #E2E8F0;
        }
        .input-field:focus {
            border-color: var(--wacoal-pink);
            box-shadow: 0 0 0 3px rgba(227, 0, 79, 0.1);
        }

        .loader { 
            border-top-color: var(--wacoal-pink); 
            animation: spinner 1s linear infinite; 
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Elegant Scrollbar */
        .custom-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 10px; 
            border: 2px solid transparent; 
            background-clip: padding-box; 
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box; }
        
        /* Table Sticky adjustments */
        .table-header-glass {
            background: rgba(253, 242, 248, 0.95);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-pink-200 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 z-[-1]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-rose-200 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 z-[-1]"></div>

    <div id="app" class="flex-grow flex flex-col items-center p-4 sm:p-6 w-full">
        
        <div id="loginPage" class="w-full max-w-md glass-card rounded-3xl p-8 sm:p-10 mt-12 sm:mt-20">
            <div class="text-center mb-10">
                <div class="flex justify-center mb-6">
                    <div class="text-4xl font-light tracking-widest text-gray-800">
                        WACOAL
                    </div>
                </div>
                <h2 class="text-lg sm:text-xl font-medium text-gray-600">ระบบจัดการข้อมูลการรับบิล</h2>
                <p class="text-sm text-gray-400 mt-1">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
            </div>
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">ชื่อผู้ใช้งาน</label>
                    <input type="text" id="username" required class="input-field w-full px-4 py-3.5 rounded-xl outline-none bg-white/50" placeholder="Username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">รหัสผ่าน</label>
                    <input type="password" id="password" required class="input-field w-full px-4 py-3.5 rounded-xl outline-none bg-white/50" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-wacoal-pink text-white font-medium py-3.5 rounded-xl btn-hover mt-4">
                    เข้าสู่ระบบ
                </button>
            </form>
            <div id="loginError" class="mt-6 text-center text-sm text-red-500 bg-red-50 py-2 rounded-lg hidden border border-red-100">
                ⚠️ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
            </div>
        </div>

        <div id="dashboardPage" class="hidden w-full max-w-7xl flex flex-col space-y-6 animate-fade-in">
            
            <div class="sticky top-4 z-50 glass-card rounded-2xl p-4 sm:px-6 flex justify-between items-center transition-all">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-wacoal-pink rounded-xl flex items-center justify-center text-white font-light text-2xl shadow-inner shadow-pink-300/50">
                        W
                    </div>
                    <div>
                        <h1 class="text-lg font-semibold text-gray-800" id="userDisplayName">Welcome</h1>
                        <p class="text-wacoal-pink text-sm font-medium">Receive Bill Management</p>
                    </div>
                </div>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <button onclick="fetchData()" class="flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:text-wacoal-pink bg-white/50 hover:bg-white rounded-lg transition-colors border border-transparent hover:border-pink-100">
                        <span class="mr-1.5">🔄</span> รีเฟรช
                    </button>
                    <div class="w-px h-6 bg-gray-200 hidden sm:block"></div>
                    <button onclick="logout()" class="px-3 py-2 text-sm font-medium text-gray-500 hover:text-red-600 transition-colors">
                        ออกจากระบบ
                    </button>
                </div>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto custom-scroll max-h-[70vh]">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="sticky top-0 z-40 table-header-glass border-b border-pink-100 shadow-sm">
                            <tr>
                                <th class="px-6 py-4 text-sm font-medium text-gray-700">Store Name</th>
                                <th class="px-6 py-4 text-sm font-medium text-gray-700">Store ID</th>
                                <th class="px-6 py-4 text-sm font-semibold text-wacoal-pink sticky left-0 table-header-glass border-r border-pink-100 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">Bill No.</th>
                                <th class="px-6 py-4 text-sm font-medium text-gray-700">Bill Date</th>
                                <th class="px-6 py-4 text-sm font-medium text-gray-700 text-center">QTY</th>
                                <th class="px-6 py-4 text-sm font-medium text-gray-700 text-right">Total</th>
                                <th class="px-6 py-4 text-sm font-medium text-gray-700">Received Date</th>
                                <th class="px-6 py-4 text-sm font-medium text-gray-700 text-center">Status</th>
                                <th class="px-6 py-4 text-sm font-medium text-gray-700 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="billTableBody" class="divide-y divide-gray-100 bg-white/40">
                            </tbody>
                    </table>
                </div>
            </div>
            
            <div class="text-center text-xs text-gray-400 mt-4">
                &copy; 2026 Wacoal Receive Bill System. Internal Use Only.
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-900/90 text-white text-sm font-medium rounded-full shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-[60] backdrop-blur-sm border border-gray-700">
    </div>

    <div id="globalLoader" class="fixed inset-0 bg-white/70 backdrop-blur-sm hidden flex-col items-center justify-center z-[100]">
        <div class="loader rounded-full border-4 border-gray-100 h-14 w-14 mb-4 shadow-lg"></div>
        <div class="text-wacoal-pink font-medium text-sm animate-pulse">กำลังประมวลผล...</div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_S5fCo98f9he40ApSUnZks2XC-NB3OSmNBj-43K8MdNLMKtaV6oNLqFHqay_Yb0I/exec';
        let currentUser = null;
        let allBills = [];

        // --- Auth Logic ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userInp = document.getElementById('username').value.trim();
            const passInp = document.getElementById('password').value.trim();
            
            toggleLoader(true);
            try {
                const res = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(userInp)}&password=${encodeURIComponent(passInp)}`);
                const result = await res.json();
                if (result.success) { currentUser = result.user; showDashboard(); }
                else { showLoginError(); }
            } catch (e) { showToast("⚠️ การเชื่อมต่อผิดพลาด"); }
            finally { toggleLoader(false); }
        });

        async function fetchData() {
            const tbody = document.getElementById('billTableBody');
            tbody.innerHTML = '<tr><td colspan="9" class="px-6 py-16 text-center"><div class="inline-block loader rounded-full border-2 border-gray-100 h-8 w-8 mb-2"></div><div class="text-sm text-gray-500">กำลังโหลดข้อมูล...</div></td></tr>';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getBills&store=${encodeURIComponent(currentUser.store)}`);
                const result = await res.json();
                allBills = result.data || [];
                renderBills(allBills);
            } catch (e) { showToast("❌ โหลดข้อมูลล้มเหลว"); }
        }

        function renderBills(bills) {
            const tbody = document.getElementById('billTableBody');
            tbody.innerHTML = '';
            
            if (bills.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="px-6 py-12 text-center text-sm text-gray-400">ไม่พบข้อมูลบิล</td></tr>';
                return;
            }

            bills.forEach((bill, index) => {
                const inputVal = formatDateForInput(bill.receivedDate);
                const displayVal = formatDateDisplay(bill.receivedDate);
                const isReceived = !!bill.receivedDate;
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-pink-50/50 transition-colors group";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm text-gray-700">${bill.storeName}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${bill.store}</td>
                    <td class="px-6 py-4 text-sm font-semibold text-gray-800 sticky left-0 bg-white group-hover:bg-[#FDF6F8] border-r border-gray-100 transition-colors shadow-[2px_0_5px_-2px_rgba(0,0,0,0.02)]">${bill.billNo}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${bill.billDate}</td>
                    <td class="px-6 py-4 text-sm text-center text-gray-600">${bill.qty}</td>
                    <td class="px-6 py-4 text-sm text-right font-medium text-gray-800">฿${Number(bill.total).toLocaleString()}</td>
                    <td class="px-6 py-4">
                        <div class="flex flex-col">
                            <input type="date" value="${inputVal}" id="date-${index}" class="input-field rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none">
                            <span class="text-[11px] mt-1.5 ${isReceived ? 'text-green-600 font-medium' : 'text-gray-400'}">
                                ${isReceived ? '✓ รับบิลวันที่ : ' + displayVal : 'ยังไม่ได้ระบุ'}
                            </span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="inline-flex items-center justify-center px-2.5 py-1 text-xs font-medium rounded-full border ${isReceived ? 'bg-green-50 text-green-600 border-green-200' : 'bg-orange-50 text-orange-500 border-orange-200'}">
                            ${isReceived ? 'Received' : 'Pending'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="updateData(${index})" class="bg-white border border-wacoal-pink text-wacoal-pink hover:bg-wacoal-pink hover:text-white transition-all px-4 py-1.5 rounded-lg text-xs font-medium shadow-sm hover:shadow-md">
                            บันทึก
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updateData(index) {
            const bill = allBills[index];
            const dateInput = document.getElementById(`date-${index}`);
            const selectedDateStr = dateInput.value; 

            if (!selectedDateStr) return showToast("⚠️ กรุณาระบุวันที่รับบิล");

            // --- Validation Logic ---
            const [y, m, d] = selectedDateStr.split('-').map(Number);
            const receivedDate = new Date(y, m - 1, d);
            
            const billDate = parseThaiDate(bill.billDate); 
            const today = new Date(); today.setHours(0,0,0,0);

            if (billDate && receivedDate < billDate) {
                showToast(`❌ วันที่รับห้ามก่อนวันที่บิลออก (${bill.billDate.substring(0,10)})`);
                return;
            }
            if (receivedDate > today) {
                showToast("❌ วันที่รับห้ามเกินวันที่ปัจจุบัน");
                return;
            }

            toggleLoader(true);
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'updateDate', billNo: bill.billNo, receivedDate: selectedDateStr })
                });
                showToast("✅ บันทึกข้อมูลสำเร็จ");
                setTimeout(fetchData, 1200);
            } catch (e) { showToast("❌ บันทึกไม่สำเร็จ กรุณาลองใหม่"); }
            finally { toggleLoader(false); }
        }

        // --- Helper Utils ---
        function parseThaiDate(dateStr) {
            if (!dateStr) return null;
            const parts = dateStr.substring(0, 10).split('/');
            if (parts.length !== 3) return null;
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function formatDateDisplay(dateVal) {
            if (!dateVal) return "-";
            const d = new Date(dateVal);
            if (isNaN(d.getTime())) return dateVal;
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}/${d.getFullYear()}`;
        }

        function formatDateForInput(dateVal) {
            if (!dateVal) return "";
            const d = new Date(dateVal);
            if (isNaN(d.getTime())) return "";
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${d.getFullYear()}-${month}-${day}`;
        }

        function toggleLoader(show) { document.getElementById('globalLoader').classList.toggle('hidden', !show); document.getElementById('globalLoader').classList.toggle('flex', show); }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('opacity-0', 'translate-y-4'); t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { t.classList.add('opacity-0', 'translate-y-4'); t.classList.remove('opacity-100', 'translate-y-0'); }, 3000);
        }
        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('userDisplayName').innerText = `สวัสดี, ${currentUser.name}`;
            fetchData();
        }
        function logout() { location.reload(); }
        function showLoginError() {
            document.getElementById('loginError').classList.remove('hidden');
            setTimeout(() => document.getElementById('loginError').classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
